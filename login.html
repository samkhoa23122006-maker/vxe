<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Bus Ticket Management</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-form">
            <h1 class="logo">🚌 BusTicket Pro</h1>
            
            <div id="loginSection">
                <h2>Đăng nhập</h2>
                <form id="loginForm">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" required>
                    </div>
                    <div class="form-group">
                        <label>Mật khẩu</label>
                        <div class="password-group">
                            <input type="password" id="loginPassword" required>
                            <button type="button" class="toggle-password" onclick="togglePassword('loginPassword')">👁️</button>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary" style="width: 100%; margin-top: 20px;">Đăng nhập</button>
                </form>
                <p style="text-align: center; margin-top: 15px;">
                    Chưa có tài khoản? <a href="#" onclick="switchToRegister(event)">Đăng ký ngay</a>
                </p>
                <p style="text-align: center;">
                    <a href="#" onclick="switchToForgot(event)">Quên mật khẩu?</a>
                </p>

                <!-- Demo Accounts -->
                <div class="demo-accounts">
                    <p><strong>Tài khoản demo:</strong></p>
                    <p>Admin: admin@bus.com / admin123</p>
                    <p>Nhân viên: staff@bus.com / staff123</p>
                </div>
            </div>

            <div id="registerSection" style="display: none;">
                <h2>Đăng ký tài khoản</h2>
                <form id="registerForm">
                    <div class="form-group">
                        <label>Họ và tên</label>
                        <input type="text" id="regName" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="regEmail" required>
                    </div>
                    <div class="form-group">
                        <label>Số điện thoại</label>
                        <input type="tel" id="regPhone" required>
                    </div>
                    <div class="form-group">
                        <label>Mật khẩu</label>
                        <div class="password-group">
                            <input type="password" id="regPassword" required>
                            <button type="button" class="toggle-password" onclick="togglePassword('regPassword')">👁️</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Xác nhận mật khẩu</label>
                        <input type="password" id="regConfirmPassword" required>
                    </div>
                    <button type="submit" class="btn-primary" style="width: 100%; margin-top: 20px;">Đăng ký</button>
                </form>
                <p style="text-align: center; margin-top: 15px;">
                    Đã có tài khoản? <a href="#" onclick="switchToLogin(event)">Đăng nhập</a>
                </p>
            </div>

            <div id="forgotSection" style="display: none;">
                <h2>Quên mật khẩu</h2>
                <form id="forgotForm">
                    <div class="form-group">
                        <label>Nhập email đăng ký</label>
                        <input type="email" id="forgotEmail" required>
                    </div>
                    <button type="submit" class="btn-primary" style="width: 100%; margin-top: 20px;">Gửi liên kết reset</button>
                </form>
                <p style="text-align: center; margin-top: 15px;">
                    <a href="#" onclick="switchToLogin(event)">Quay lại đăng nhập</a>
                </p>
            </div>

            <div id="resetSection" style="display: none;">
                <h2>Đặt lại mật khẩu</h2>
                <form id="resetForm">
                    <div class="form-group">
                        <label>Mật khẩu mới</label>
                        <div class="password-group">
                            <input type="password" id="resetPassword" required>
                            <button type="button" class="toggle-password" onclick="togglePassword('resetPassword')">👁️</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Xác nhận mật khẩu</label>
                        <input type="password" id="resetConfirmPassword" required>
                    </div>
                    <button type="submit" class="btn-primary" style="width: 100%; margin-top: 20px;">Cập nhật mật khẩu</button>
                </form>
            </div>
        </div>
    </div>

    <script src="db.js"></script>
    <script src="auth.js"></script>
    <script src="utils.js"></script>
    <script>
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        function switchToRegister(e) {
            e.preventDefault();
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('registerSection').style.display = 'block';
            document.getElementById('forgotSection').style.display = 'none';
        }

        function switchToLogin(e) {
            e.preventDefault();
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('registerSection').style.display = 'none';
            document.getElementById('forgotSection').style.display = 'none';
        }

        function switchToForgot(e) {
            e.preventDefault();
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('forgotSection').style.display = 'block';
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            const result = auth.login(email, password);
            if (result.success) {
                showNotification('Đăng nhập thành công!');
                setTimeout(() => {
                    if (auth.hasRole('admin') || auth.hasRole('staff')) {
                        window.location.href = 'admin-dashboard.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                }, 1000);
            } else {
                showNotification(result.message, 'error');
            }
        });

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const phone = document.getElementById('regPhone').value;
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            
            const result = auth.register(name, email, phone, password, confirmPassword);
            if (result.success) {
                showNotification('Đăng ký thành công! Vui lòng đăng nhập.');
                setTimeout(() => switchToLogin({preventDefault: () => {}}), 1000);
            } else {
                showNotification(result.message, 'error');
            }
        });

        document.getElementById('forgotForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('forgotEmail').value;
            
            const result = db.forgotPassword(email);
            if (result.success) {
                showNotification(result.message);
                const token = result.token;
                setTimeout(() => {
                    document.getElementById('forgotSection').style.display = 'none';
                    document.getElementById('resetSection').style.display = 'block';
                    document.getElementById('resetForm').dataset.email = email;
                    document.getElementById('resetForm').dataset.token = token;
                }, 1000);
            } else {
                showNotification(result.message, 'error');
            }
        });

        document.getElementById('resetForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = this.dataset.email;
            const token = this.dataset.token;
            const newPassword = document.getElementById('resetPassword').value;
            const confirmPassword = document.getElementById('resetConfirmPassword').value;
            
            const result = auth.resetPassword(email, token, newPassword, confirmPassword);
            if (result.success) {
                showNotification(result.message);
                setTimeout(() => switchToLogin({preventDefault: () => {}}), 1000);
            } else {
                showNotification(result.message, 'error');
            }
        });
    </script>
</body>
</html>
